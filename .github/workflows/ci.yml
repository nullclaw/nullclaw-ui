name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Run type and Svelte checks
        run: npm run check

      - name: Build
        run: npm run build

      - name: Package release artifacts (smoke)
        run: bash ./scripts/package-release.sh "v0.0.0-ci" release

      - name: Verify release artifact layout
        run: bash ./scripts/verify-release-package.sh "v0.0.0-ci" release
